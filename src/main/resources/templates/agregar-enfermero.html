<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" th:href="@{agregar-enfermero.css}">
  <title>Agregar Enfermero</title>
</head>
<body>

  <header>
    <div class="boton">
      <a href="/gestion">Volver</a>
    </div>
  </header>

  <div class="padre">
    <div class="contenedor">

      <form action="/insertar-enfermero" method="post">
        <div class="entradas">
          <a>RUT</a>
          <label>
            <input type="text" name="rut" placeholder="11.222.333-4">
          </label>
        </div>

        <div class="entradas">
          <a>Nombres</a>
          <label>
            <input type="text" name="nombres" placeholder="Juan Camilo">
          </label>
        </div>

        <div class="entradas">
          <a>Apellidos</a>
          <label>
            <input type="text" name="apellidos" placeholder="Pérez Aravena">
          </label>
        </div>

        <div>
          <button type="submit">Agregar</button>
        </div>
      </form>

    </div>

  </div>

</body>
</html>
